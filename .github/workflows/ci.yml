name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip and install dependencies
        run: |
          python -m pip install --upgrade pip
          # 运行依赖（src 实际仅用 stdlib + 惰性 import yfinance；requirements 为完整运行环境声明）
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # 测试框架；yfinance 在测试中被 mock，无需安装
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -o addopts="" -v
